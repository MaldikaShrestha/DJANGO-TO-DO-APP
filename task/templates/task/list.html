<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

<style>

	body{
		background-color: pink;
	}

	input{
		width: 100%;
		padding: 12px 20px;
		margin: 8px 0;
		box-sizing: border-box;
	}

	input::placeholder {
	  color: #d3d3d3;
	}

	.submit{
		background-color: #6BA3E8;
	}
    .center-column h3 {
    text-align: center;      /* Center the heading */
    font-size: 28px;          /* Slightly larger than default */
    font-weight: 600;         /* Semi-bold */
    color: #3a2f3f;           /* Darker, contrasting color */
    margin-bottom: 20px;      /* Space below the heading */
    text-transform: uppercase; /* Optional: makes it uppercase */
    letter-spacing: 1px;       /* Adds a bit of spacing between letters */
}

	.center-column{
		width:600px;
		margin: 20px auto;
		padding:20px;
		background-color: #c29ebb;
		border-radius: 3px;
		box-shadow: 6px 2px 30px 0px rgba(0,0,0,0.75);
	}

	.item-row {
    background-color:  #edbfda;
    margin: 10px;
    padding: 20px;
    border-radius: 3px;
    color: #1a1919;
    font-size: 16px;
    font-weight: 500;  /* less bold */
    box-shadow: 0px -1px 10px -4px rgba(0,0,0,0.75);

    display: flex;             /* enables flex layout */
    justify-content: space-between; /* pushes buttons to the right */
    align-items: center;       /* vertically center the items */
}

    .item-buttons {
    display: flex;       /* keep buttons in a row */
    gap: 5px;            /* small space between Update and Delete */
    }
	.btn-danger{
		background-color:red;
		border-color: red;
	}

</style>

<div class="center-column">
    <h3> TO DO LIST </h3>

	<form method="POST" action="/">
		{% csrf_token %}
		{{form.title}}
		<input class="btn btn-info" type="submit" name="Create Task">
	</form>

	<div class="todo-list">

	{% for task in tasks %}
		<div class="item-row">
			
			{% if task.complete == True %}
			<strike>{{task}}</strike>
			{% else %}
			<span>{{task}}</span>
			{% endif %}
            <div class="item-buttons">
            <a class="btn btn-sm btn-info" href="{% url 'update_task' task.id %}">Update</a>
			<a class="btn btn-sm btn-danger" href="{% url 'delete_task' task.id %}">Delete</a>
            </div>
		</div>
	{% endfor %}
	</div>
</div>
